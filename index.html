<!DOCTYPE html>
<html>
<head>
  <title>TB-Link System</title>
</head>

<body style="font-family:sans-serif; margin:0;">

<h2 style="padding:10px;">TB-Link System</h2>

<div style="display:flex; height:90vh;">

  <!-- LEFT MENU -->
  <div style="width:220px; border-right:1px solid #ccc; padding:10px;">
    <button onclick="showTab('patients')">👥 Patients</button><br><br>
    <button onclick="showTab('screening')">1. Screening</button><br><br>
    <button onclick="showTab('diagnosis')">2. Diagnosis</button><br><br>
    <button onclick="showTab('treatment')">3. Treatment</button><br><br>
    <button onclick="showTab('followup')">4. Follow-up</button><br><br>
    <button onclick="showTab('outcome')">5. Outcome</button><br><br>
    <button onclick="showTab('dashboard')">📊 Dashboard</button>
  </div>

  <!-- RIGHT -->
  <div style="flex:1; padding:20px;">
    <div id="content">Loading...</div>
  </div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://ggsyhzumthecewuvmgxu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a3V5cmVieHBjanFqbHNtZmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg2MzksImV4cCI6MjA5MTIwNDYzOX0.YDSvhyHrufJMhfz37ZGSY6-11Ebkxsg-ErIh43Aw-DA";

function headers() {
  return {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };
}

let currentPatientId = null;
let currentEpisodeId = null;

// ================= NAV =================
function showTab(tab) {
  if (tab === "patients") renderPatients();
  if (tab === "screening") renderScreening();
  if (tab === "diagnosis") renderDiagnosis();
  if (tab === "treatment") renderTreatment();
  if (tab === "followup") renderFollowup();
  if (tab === "outcome") renderOutcome();
  if (tab === "dashboard") renderDashboard();
}

// ================= PATIENT LIST =================
function renderPatients() {
  document.getElementById("content").innerHTML = `
    <h3>👥 Patients</h3>
    <input id="search" placeholder="Search..." onkeyup="loadPatients()"><br><br>
    <div id="patientList"></div>
  `;
  loadPatients();
}

async function loadPatients() {
  const keyword = document.getElementById("search")?.value || "";

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/patients?select=*&name=ilike.*${keyword}*`,
    { headers: headers() }
  );

  const data = await res.json();

  let html = "";
  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer;"
           onclick="selectPatient('${p.id}')">
        <b>${p.name}</b> (${p.age})
      </div>
    `;
  });

  document.getElementById("patientList").innerHTML = html || "No patients";
}

// ================= SELECT PATIENT =================
async function selectPatient(patientId) {

  currentPatientId = patientId;

  const p = await fetch(`${SUPABASE_URL}/rest/v1/patients?id=eq.${patientId}&select=*`, {headers:headers()});
  const patient = (await p.json())[0];

  const e = await fetch(`${SUPABASE_URL}/rest/v1/episodes?patient_id=eq.${patientId}&select=*`, {headers:headers()});
  const episode = (await e.json())[0];

  currentEpisodeId = episode?.id || null;

  document.getElementById("content").innerHTML = `
    <h2>👤 ${patient.name}</h2>
    Age: ${patient.age}<br><br>

    Episode ID: ${episode?.id || "None"}<br>
    Status: ${episode?.status || "N/A"}<br><br>

    <button onclick="showTab('diagnosis')">Diagnosis</button>
    <button onclick="showTab('treatment')">Treatment</button>
  `;
}

// ================= SCREENING =================
function renderScreening() {
  document.getElementById("content").innerHTML = `
    <h3>🩺 Screening</h3>

    <input id="name" placeholder="Name"><br><br>
    <input id="age" placeholder="Age"><br><br>

    <select id="sex">
      <option>Male</option>
      <option>Female</option>
    </select><br><br>

    <button onclick="savePatient()">Save</button>
  `;
}

async function savePatient() {

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const sex = document.getElementById("sex").value;

  const p = await fetch(`${SUPABASE_URL}/rest/v1/patients`, {
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{name, age, sex}])
  });

  const patient = (await p.json())[0];

  const e = await fetch(`${SUPABASE_URL}/rest/v1/episodes`, {
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{patient_id: patient.id}])
  });

  const episode = (await e.json())[0];

  currentEpisodeId = episode.id;

  alert("Saved");
}

// ================= DIAGNOSIS =================
function renderDiagnosis() {
  document.getElementById("content").innerHTML = `
    <h3>Diagnosis</h3>

    <select id="patient_type">
      <option>New</option>
      <option>Recurrent</option>
    </select><br><br>

    <select id="tb_site">
      <option>Pulmonary</option>
      <option>Extra-pulmonary</option>
    </select><br><br>

    <select id="hiv">
      <option>Positive</option>
      <option>Negative</option>
    </select><br><br>

    <button onclick="saveDiagnosis()">Save Diagnosis</button>
  `;
}

async function saveDiagnosis() {

  const patient_type = document.getElementById("patient_type").value;
  const tb_site = document.getElementById("tb_site").value;
  const hiv = document.getElementById("hiv").value;

  await fetch(`${SUPABASE_URL}/rest/v1/episodes?id=eq.${currentEpisodeId}`, {
    method:"PATCH",
    headers:headers(),
    body:JSON.stringify({
      patient_type,
      tb_site,
      hiv_status: hiv
    })
  });

  alert("Saved");
}

// ================= TREATMENT =================
function renderTreatment() {
  document.getElementById("content").innerHTML = `
    <h3>Treatment</h3>

    <input id="regimen" placeholder="Regimen"><br><br>
    <input type="date" id="start"><br><br>

    <button onclick="startTreatment()">Start</button>
  `;
}

async function startTreatment() {

  const regimen = document.getElementById("regimen").value;
  const start = document.getElementById("start").value;

  await fetch(`${SUPABASE_URL}/rest/v1/episodes?id=eq.${currentEpisodeId}`, {
    method:"PATCH",
    headers:headers(),
    body:JSON.stringify({
      regimen_name: regimen,
      treatment_start_date: start,
      status: "On Treatment"
    })
  });

  alert("Treatment started");
}

// ================= FOLLOW-UP =================
function renderFollowup() {
  document.getElementById("content").innerHTML = `
    <h3>Follow-up</h3>
    <input id="weight" placeholder="Weight"><br><br>
    <button onclick="addFollowup()">Save</button>
  `;
}

async function addFollowup() {
  const weight = document.getElementById("weight").value;

  await fetch(`${SUPABASE_URL}/rest/v1/followups`, {
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{episode_id: currentEpisodeId, weight}])
  });

  alert("Saved");
}

// ================= OUTCOME =================
function renderOutcome() {
  document.getElementById("content").innerHTML = `
    <h3>Outcome</h3>

    <select id="outcome">
      <option>Cured</option>
      <option>Completed</option>
    </select><br><br>

    <button onclick="saveOutcome()">Save</button>
  `;
}

async function saveOutcome() {
  const outcome = document.getElementById("outcome").value;

  await fetch(`${SUPABASE_URL}/rest/v1/outcomes`, {
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{episode_id: currentEpisodeId, outcome}])
  });

  alert("Saved");
}

// ================= DASHBOARD =================
function renderDashboard() {
  document.getElementById("content").innerHTML = `
    <h3>Dashboard</h3>
    <div id="stats"></div>
  `;
  loadStats();
}

async function loadStats() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/episodes?select=*`, {headers:headers()});
  const data = await res.json();

  document.getElementById("stats").innerHTML = `
    Total: ${data.length}<br>
    On Treatment: ${data.filter(x=>x.status==="On Treatment").length}
  `;
}

// DEFAULT
showTab("patients");

</script>

</body>
</html>
