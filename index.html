<!DOCTYPE html>
<html>
<head>
  <title>TB-Link System</title>
</head>

<body style="font-family:sans-serif;">

<h2>TB-Link System</h2>

<div style="display:flex;">

  <!-- LEFT MENU -->
  <div style="width:220px; border-right:1px solid #ccc; padding:10px;">
    <button onclick="showTab('patients')">👥 Patients</button><br><br>
    <button onclick="showTab('screening')">1. Screening</button><br><br>
    <button onclick="showTab('diagnosis')">2. Diagnosis</button><br><br>
    <button onclick="showTab('treatment')">3. Treatment</button><br><br>
    <button onclick="showTab('followup')">4. Follow-up</button><br><br>
    <button onclick="showTab('outcome')">5. Outcome</button><br><br>
    <button onclick="showTab('dashboard')">📊 Dashboard</button>
  </div>

  <!-- RIGHT PANEL -->
  <div style="flex:1; padding:20px;">
    <div id="content"></div>
  </div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://uvkuyrebxpcjqjlsmfgr.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a3V5cmVieHBjanFqbHNtZmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg2MzksImV4cCI6MjA5MTIwNDYzOX0.YDSvhyHrufJMhfz37ZGSY6-11Ebkxsg-ErIh43Aw-DA";

function headers() {
  return {
    "Content-Type": "application/json",
    "apikey": API_KEY,
    "Authorization": "Bearer " + API_KEY,
    "Prefer": "return=representation"
  };
}

let currentEpisodeId = null;

// ================= NAV =================
function showTab(tab) {
  if (tab === "patients") renderPatients();
  if (tab === "screening") renderScreening();
  if (tab === "diagnosis") renderDiagnosis();
  if (tab === "treatment") renderTreatment();
  if (tab === "followup") renderFollowup();
  if (tab === "outcome") renderOutcome();
  if (tab === "dashboard") renderDashboard();
}

// ================= PATIENT LIST + DETAIL =================
function renderPatients() {
  document.getElementById("content").innerHTML = `
    <div style="display:flex">

      <div style="width:250px;">
        <input id="search" placeholder="Search..." onkeyup="loadPatients()"><br><br>

        <select id="filter" onchange="loadPatients()">
          <option value="">All</option>
          <option value="On Treatment">On Treatment</option>
          <option value="Completed">Completed</option>
        </select><br><br>

        <div id="patientList"></div>
      </div>

      <div style="flex:1; padding:20px;" id="detailPanel">
        Select patient
      </div>

    </div>
  `;

  loadPatients();
}

async function loadPatients() {

  const keyword = document.getElementById("search")?.value || "";

  const res = await fetch(`${SUPABASE_URL}/rest/v1/patients?name=ilike.*${keyword}*`, {
    headers: headers()
  });

  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc; padding:8px; margin:5px; cursor:pointer;"
           onclick="selectPatient('${p.id}')">
        ${p.name} (${p.age})
      </div>
    `;
  });

  document.getElementById("patientList").innerHTML = html || "No patients";
}

async function selectPatient(patientId) {

  const ep = await fetch(`${SUPABASE_URL}/rest/v1/episodes?patient_id=eq.${patientId}`)
    .then(r => r.json());

  if (!ep.length) return;

  currentEpisodeId = ep[0].id;

  const lab = await fetch(`${SUPABASE_URL}/rest/v1/lab_results?episode_id=eq.${currentEpisodeId}`)
    .then(r => r.json());

  const follow = await fetch(`${SUPABASE_URL}/rest/v1/followups?episode_id=eq.${currentEpisodeId}`)
    .then(r => r.json());

  const outcome = await fetch(`${SUPABASE_URL}/rest/v1/outcomes?episode_id=eq.${currentEpisodeId}`)
    .then(r => r.json());

  document.getElementById("detailPanel").innerHTML = `
    <h3>📋 Patient Detail</h3>

    <h4>🩺 Screening</h4>
    ${lab.map(l => `
      CXR: ${l.cxr_result || ""}<br>
      Smear: ${l.smear_result || ""}
    `).join("<hr>")}

    <h4>🧪 Diagnosis</h4>
    ${lab.map(l => `
      Xpert: ${l.xpert_mtb_rif || ""}<br>
      XDR: ${l.xpert_xdr || ""}<br>
      Bacteriology: ${l.bacteriology || ""}
    `).join("<hr>")}

    <h4>📊 Follow-ups</h4>
    ${follow.map(f => `
      Date: ${f.visit_date}<br>
      Weight: ${f.weight}
    `).join("<hr>")}

    <h4>🏁 Outcome</h4>
    ${outcome.map(o => `
      ${o.outcome}
    `)}
  `;
}

// ================= SCREENING =================
function renderScreening() {
  document.getElementById("content").innerHTML = `
    <h3>🩺 Screening</h3>

    <input id="name" placeholder="Name"><br><br>
    <input id="age" placeholder="Age"><br><br>

    <select id="sex">
      <option>Male</option>
      <option>Female</option>
    </select><br><br>

    <select id="cxr">
      <option>Active TB</option>
      <option>Healed TB</option>
      <option>Suggestive of TB</option>
      <option>No-TB</option>
    </select><br><br>

    <select id="smear">
      <option>+</option>
      <option>++</option>
      <option>+++</option>
      <option>scanty</option>
      <option>MTB not seen</option>
    </select><br><br>

    <button onclick="saveScreening()">Save</button>
  `;
}

async function saveScreening() {

  const name = document.getElementById("name").value;
  const age = parseInt(document.getElementById("age").value);
  const sex = document.getElementById("sex").value;

  const cxr = document.getElementById("cxr").value;
  const smear = document.getElementById("smear").value;

  const p = await fetch(`${SUPABASE_URL}/rest/v1/patients`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ name, age, sex }])
  }).then(r => r.json());

  const e = await fetch(`${SUPABASE_URL}/rest/v1/episodes`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ patient_id: p[0].id }])
  }).then(r => r.json());

  currentEpisodeId = e[0].id;

  await fetch(`${SUPABASE_URL}/rest/v1/lab_results`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ episode_id: currentEpisodeId, cxr_result: cxr, smear_result: smear }])
  });

  alert("✅ Screening saved");
}

// ================= DIAGNOSIS =================
function renderDiagnosis() {
  document.getElementById("content").innerHTML = `
    <h3>🧪 Diagnosis</h3>

    <select id="xpert">
      <option>MTB Negative</option>
      <option>MTB Detected</option>
      <option>MTB Detected but Rifampicin Resistance Indeterminate</option>
      <option>Rifampicin Resistance Detected</option>
      <option>Invalid/Error</option>
    </select><br><br>

    <input id="xdr" placeholder="XDR pattern"><br><br>

    <select id="bact">
      <option>MTB Detected</option>
      <option>MTB Not Detected</option>
    </select><br><br>

    <button onclick="saveDiagnosis()">Save</button>
  `;
}

async function saveDiagnosis() {

  await fetch(`${SUPABASE_URL}/rest/v1/lab_results`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{
      episode_id: currentEpisodeId,
      xpert_mtb_rif: document.getElementById("xpert").value,
      xpert_xdr: document.getElementById("xdr").value,
      bacteriology: document.getElementById("bact").value
    }])
  });

  alert("✅ Diagnosis saved");
}

// ================= TREATMENT =================
function renderTreatment() {
  document.getElementById("content").innerHTML = `
    <h3>💊 Treatment</h3>
    <button onclick="startTreatment()">Start Treatment</button>
  `;
}

async function startTreatment() {
  await fetch(`${SUPABASE_URL}/rest/v1/treatments`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ episode_id: currentEpisodeId, status: "On Treatment" }])
  });
  alert("✅ Treatment started");
}

// ================= FOLLOW-UP =================
function renderFollowup() {
  document.getElementById("content").innerHTML = `
    <h3>📊 Follow-up</h3>
    <input id="weight" placeholder="Weight"><br><br>
    <button onclick="addFollowup()">Save</button>
  `;
}

async function addFollowup() {
  await fetch(`${SUPABASE_URL}/rest/v1/followups`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ episode_id: currentEpisodeId, weight: document.getElementById("weight").value }])
  });
  alert("✅ Follow-up saved");
}

// ================= OUTCOME =================
function renderOutcome() {
  document.getElementById("content").innerHTML = `
    <h3>🏁 Outcome</h3>
    <select id="outcome">
      <option>Completed</option>
      <option>Cured</option>
      <option>Failed</option>
      <option>Died</option>
    </select><br><br>
    <button onclick="saveOutcome()">Save</button>
  `;
}

async function saveOutcome() {
  await fetch(`${SUPABASE_URL}/rest/v1/outcomes`, {
    method: "POST", headers: headers(),
    body: JSON.stringify([{ episode_id: currentEpisodeId, outcome: document.getElementById("outcome").value }])
  });
  alert("✅ Outcome saved");
}

// ================= DASHBOARD =================
function renderDashboard() {
  document.getElementById("content").innerHTML = `
    <h3>📊 TB Dashboard</h3>
    <div id="stats"></div>
  `;
  loadStats();
}

async function loadStats() {
  const p = await fetch(`${SUPABASE_URL}/rest/v1/patients`).then(r=>r.json());
  const t = await fetch(`${SUPABASE_URL}/rest/v1/treatments`).then(r=>r.json());

  document.getElementById("stats").innerHTML = `
    Total Patients: ${p.length}<br>
    On Treatment: ${t.length}
  `;
}

// START
showTab("patients");

</script>

</body>
</html>
