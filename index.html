<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TB-Link System</title>
<style>
body { font-family: Arial; }
.container { display: flex; }
.sidebar { width: 220px; padding: 10px; }
.content { flex: 1; padding: 20px; border-left: 1px solid #ccc; }
button { margin: 5px 0; }
input, select, textarea { width: 250px; margin-bottom: 10px; }
</style>
</head>

<body>

<h2>TB-Link System</h2>

<div class="container">

<!-- LEFT MENU -->
<div class="sidebar">
<button onclick="showTab('screening')">1. Screening</button><br>
<button onclick="showTab('diagnosis')">2. Diagnosis</button><br>
<button onclick="showTab('treatment')">3. Treatment</button><br>
<button onclick="showTab('followup')">4. Follow-up</button><br>
<button onclick="showTab('outcome')">5. Outcome</button><br>
</div>

<!-- RIGHT CONTENT -->
<div class="content" id="content"></div>

</div>

<script>

// ================= NAVIGATION =================
function showTab(tab) {
  if (tab === 'screening') renderScreening();
  if (tab === 'diagnosis') renderDiagnosis();
  if (tab === 'treatment') renderTreatment();
  if (tab === 'followup') renderFollowup();
  if (tab === 'outcome') renderOutcome();
}

// ================= SCREENING =================
function renderScreening() {
  document.getElementById("content").innerHTML = `
  <h3>🩺 Screening</h3>

  Name<br><input id="name"><br>
  Age<br><input id="age"><br>

  Sex<br>
  <select id="sex">
    <option>Male</option>
    <option>Female</option>
  </select><br>

  Region<br>
  <select id="region" onchange="generatePatientCode()">
    <option value="">--select--</option>
    <option value="KCN">Kachin</option>
    <option value="KAY">Kayah</option>
    <option value="KRN">Kayin</option>
    <option value="CHN">Chin</option>
    <option value="MON">Mon</option>
    <option value="RKH">Rakhine</option>
    <option value="SHN_E">Shan (East)</option>
    <option value="SHN_N">Shan (North)</option>
    <option value="SHN_S">Shan (South)</option>
    <option value="YGN">Yangon</option>
    <option value="MDY">Mandalay</option>
    <option value="SGG">Sagaing</option>
    <option value="MGW">Magway</option>
    <option value="BGO">Bago</option>
    <option value="AYW">Ayeyarwady</option>
    <option value="NPT">Nay Pyi Taw</option>
    <option value="TNI">Tanintharyi</option>
  </select><br>

  Township<br><input id="township"><br>
  Facility<br><input id="facility" oninput="generatePatientCode()"><br>

  Registration Date<br>
  <input type="date" id="reg_date" onchange="generatePatientCode()"><br>

  Patient Code<br>
  <input id="patient_code" readonly><br>

  Chest X-ray<br>
  <select>
    <option>Normal</option>
    <option>Active TB</option>
    <option>Suggestive of TB</option>
    <option>Healed TB</option>
    <option>Others</option>
  </select><br>

  NPOC Pattern<br>
  <select>
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
  </select><br>

  Smear Microscopy<br>
  <select>
    <option>Negative</option>
    <option>Scanty</option>
    <option>+</option>
    <option>++</option>
    <option>+++</option>
  </select><br>

  <button>Save</button>
  `;
}

// ================= PATIENT CODE =================
function generatePatientCode() {
  const region = document.getElementById("region")?.value;
  const facility = document.getElementById("facility")?.value;
  const date = document.getElementById("reg_date")?.value;

  if (!region || !facility || !date) return;

  const year = new Date(date).getFullYear();
  let counter = localStorage.getItem("counter") || 1;

  const code =
    region + "_" +
    facility.toUpperCase().replace(/\s+/g, "") +
    "_M_" +
    counter +
    "_" +
    year;

  document.getElementById("patient_code").value = code;
  localStorage.setItem("counter", parseInt(counter) + 1);
}

// ================= DIAGNOSIS =================
function renderDiagnosis() {
  document.getElementById("content").innerHTML = `
  <h3>🧪 Diagnosis</h3>

  RIF Pattern<br>
  <select>
    <option>MTB Not Detected</option>
    <option>MTB Detected - Rifampicin Susceptible</option>
    <option>MTB Detected - Rifampicin Resistant</option>
    <option>MTB Detected - Rifampicin Indeterminate</option>
    <option>MTB Trace Detected</option>
    <option>Invalid / Error</option>
  </select><br>

  XDR Test Result<br>
  <select>
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
    <option>Invalid / Error</option>
  </select><br>

  INH<br>
  <select>
    <option>Susceptible</option>
    <option>High Dose Resistant</option>
    <option>Low Dose Resistant</option>
    <option>Indeterminate</option>
  </select><br>

  FQ<br>
  <select>
    <option>Susceptible</option>
    <option>High Dose Resistant</option>
    <option>Low Dose Resistant</option>
    <option>Indeterminate</option>
  </select><br>

  Injection<br>
  <select>
    <option>Susceptible</option>
    <option>Resistant</option>
    <option>Indeterminate</option>
  </select><br>

  Eto<br>
  <select>
    <option>Susceptible</option>
    <option>Resistant</option>
    <option>Indeterminate</option>
  </select><br>

  <button>Save</button>
  `;
}

// ================= TREATMENT =================
function renderTreatment() {
  document.getElementById("content").innerHTML = `
  <h3>💊 Treatment</h3>

  HIV Status<br>
  <select>
    <option>Positive</option>
    <option>Negative</option>
    <option>Unknown</option>
  </select><br>

  DM Status<br>
  <select>
    <option>Yes</option>
    <option>No</option>
    <option>Unknown</option>
  </select><br>

  Other Comorbidities<br>
  <input><br>

  Start Date<br>
  <input type="date"><br>

  Regimen<br>
  <select>
    <option>2HPMZ-2HPM</option>
    <option>2HRZE-2HR</option>
    <option>2HRZ-4HR</option>
    <option>2HRZE-4HR</option>
    <option>3HRZE-5HRE</option>
    <option>9REL</option>
    <option>9HEL</option>
    <option>9RECs</option>
    <option>Other</option>
  </select><br>

  <button>Start</button>
  `;
}

// ================= FOLLOW-UP =================
function renderFollowup() {
  document.getElementById("content").innerHTML = `
  <h3>📊 Follow-up</h3>

  Month<br><input><br>
  Weight (kg)<br><input><br>

  Smear<br>
  <select>
    <option>Negative</option>
    <option>Scanty</option>
    <option>+</option>
    <option>++</option>
    <option>+++</option>
  </select><br>

  Adverse Events<br>
  <textarea></textarea><br>

  Regimen Change<br>
  <select id="change" onchange="toggleRegimenChange()">
    <option>No</option>
    <option>Yes</option>
  </select><br>

  <div id="newRegimenBox" style="display:none;">
    New Regimen<br>
    <select>
      <option>2HPMZ-2HPM</option>
      <option>2HRZE-2HR</option>
      <option>2HRZ-4HR</option>
      <option>2HRZE-4HR</option>
      <option>3HRZE-5HRE</option>
      <option>9REL</option>
      <option>9HEL</option>
      <option>9RECs</option>
      <option>Other</option>
    </select><br>
  </div>

  <button>Save</button>
  `;
}

function toggleRegimenChange() {
  document.getElementById("newRegimenBox").style.display =
    document.getElementById("change").value === "Yes" ? "block" : "none";
}

// ================= OUTCOME =================
function renderOutcome() {
  document.getElementById("content").innerHTML = `
  <h3>🏁 Outcome</h3>

  Outcome<br>
  <select id="outcome" onchange="toggleDeath()">
    <option>Cured</option>
    <option>Completed</option>
    <option>Failed</option>
    <option>Loss to Follow Up</option>
    <option>Died</option>
    <option>Not Evaluated</option>
    <option>Reclassified as DRTB</option>
  </select><br>

  Outcome Date<br>
  <input type="date"><br>

  <div id="deathBox" style="display:none;">
    Date of Death<br>
    <input type="date"><br>

    Cause of Death<br>
    <input><br>
  </div>

  <button>Save</button>
  `;
}

function toggleDeath() {
  document.getElementById("deathBox").style.display =
    document.getElementById("outcome").value === "Died" ? "block" : "none";
}

// INIT
showTab('screening');

</script>

</body>
</html>
