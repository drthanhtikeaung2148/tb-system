<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://YOUR_PROJECT.supabase.co";
const supabaseKey = "YOUR_ANON_KEY";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// =========================
// SAVE PATIENT + EPISODE
// =========================
async function savePatient() {

  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const sex = document.getElementById("sex").value;
  const diagnosis = document.getElementById("diagnosis").value;

  // 1️⃣ Insert Patient
  const { data: patient, error: pError } = await supabaseClient
    .from("patients")
    .insert([{ name, age, sex }])
    .select()
    .single();

  if (pError) {
    alert("Patient Error: " + pError.message);
    return;
  }

  // 2️⃣ Insert Episode
  const { error: eError } = await supabaseClient
    .from("episodes")
    .insert([
      {
        patient_id: patient.id,
        diagnosis: diagnosis,
        facility: "NTP",
        created_at: new Date()
      }
    ]);

  if (eError) {
    alert("Episode Error: " + eError.message);
    return;
  }

  alert("✅ Patient + Episode saved!");
  loadDashboard();
}

// =========================
// ADD FOLLOW-UP
// =========================
async function addFollowup() {

  const episode_id = document.getElementById("episode_id").value;
  const weight = document.getElementById("weight").value;

  const { error } = await supabaseClient
    .from("followups")
    .insert([
      {
        episode_id,
        weight,
        visit_date: new Date(),
        outcome: "On Treatment"
      }
    ]);

  if (error) {
    alert("Followup Error: " + error.message);
  } else {
    alert("✅ Follow-up saved!");
  }
}

// =========================
// DASHBOARD
// =========================
async function loadDashboard() {

  const { data, error } = await supabaseClient
    .from("episodes")
    .select("id, diagnosis, patients(name, age)");

  if (error) return;

  let html = "<h3>TB Dashboard</h3>";

  data.forEach(row => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <b>${row.patients.name}</b> (${row.patients.age})
        <br>Diagnosis: ${row.diagnosis}
        <br>Episode ID: ${row.id}
      </div>
    `;
  });

  document.getElementById("dashboard").innerHTML = html;
}

// Load on start
loadDashboard();<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="sex">
  <option>Male</option>
  <option>Female</option>
</select>

<select id="diagnosis">
  <option>Confirmed TB</option>
  <option>Clinical TB</option>
</select>

<button onclick="savePatient()">Save Patient</button>

<hr>

<input id="episode_id" placeholder="Episode ID">
<input id="weight" placeholder="Weight">

<button onclick="addFollowup()">Add Follow-up</button>

<div id="dashboard"></div>
  
</script>
