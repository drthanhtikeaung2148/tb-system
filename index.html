<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TB-Link System</title>

<style>
body { font-family: Arial; }
.container { display: flex; }
.sidebar { width: 220px; padding: 10px; }
.content { flex: 1; padding: 20px; border-left: 1px solid #ccc; }
button { margin: 5px 0; }
input, select, textarea { width: 260px; margin-bottom: 10px; }
.card { border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer; }
</style>

</head>
<body>

<h2>TB-Link System</h2>

<div class="container">

<div class="sidebar">
<button onclick="showTab('patients')">👥 Patients</button><br>
<button onclick="showTab('screening')">1. Screening</button><br>
<button onclick="showTab('diagnosis')">2. Diagnosis</button><br>
<button onclick="showTab('treatment')">3. Treatment</button><br>
<button onclick="showTab('followup')">4. Follow-up</button><br>
<button onclick="showTab('outcome')">5. Outcome</button><br>
<button onclick="showTab('dashboard')">📊 Dashboard</button><br>
</div>

<div class="content" id="content"></div>

</div>

<script>

// ===== GLOBAL =====
let patients = JSON.parse(localStorage.getItem("patients") || "[]");
let currentPatient = null;

// ===== NAV =====
function showTab(tab){
  if(tab==="patients") renderPatients();
  if(tab==="screening") renderScreening();
  if(tab==="diagnosis") renderDiagnosis();
  if(tab==="treatment") renderTreatment();
  if(tab==="followup") renderFollowup();
  if(tab==="outcome") renderOutcome();
  if(tab==="dashboard") renderDashboard();
}

// ===== PATIENT LIST =====
function renderPatients(){
  let list = patients.map(p => `
    <div class="card" onclick="selectPatient('${p.code}')">
      <b>${p.name}</b> (${p.code})
    </div>
  `).join("");

  content.innerHTML = `
  <h3>👥 Patients</h3>
  <input placeholder="Search..." oninput="searchPatients(this.value)">
  <button onclick="newPatient()">+ New Patient</button>
  <div id="patientList">${list || "No patients"}</div>
  `;
}

function searchPatients(q){
  let f = patients.filter(p=>p.name.toLowerCase().includes(q.toLowerCase()));
  patientList.innerHTML = f.map(p=>`<div class="card" onclick="selectPatient('${p.code}')">${p.name}</div>`).join("");
}

function selectPatient(code){
  currentPatient = patients.find(p=>p.code===code);
  renderScreening();
}

function newPatient(){
  currentPatient=null;
  renderScreening();
}

// ===== SCREENING =====
function renderScreening(){
  const p = currentPatient || {};

  content.innerHTML = `
  <h3>🩺 Screening ${p.code?`(${p.code})`:''}</h3>

  Name<br><input id="name" value="${p.name||''}"><br>
  Age<br><input id="age" value="${p.age||''}"><br>

  Sex<br>
  <select id="sex">
    <option>Male</option>
    <option>Female</option>
  </select><br>

  Region<br>
  <select id="region" onchange="generateCode()">
    <option value="">--select--</option>
    <option>Kachin</option>
    <option>Kayah</option>
    <option>Kayin</option>
    <option>Chin</option>
    <option>Mon</option>
    <option>Rakhine</option>
    <option>Shan_East</option>
    <option>Shan_North</option>
    <option>Shan_South</option>
    <option>Yangon</option>
    <option>Mandalay</option>
    <option>Sagaing</option>
    <option>Magway</option>
    <option>Bago</option>
    <option>Ayeyarwady</option>
    <option>Naypyitaw</option>
    <option>Tanintharyi</option>
  </select><br>

  Township<br><input id="township"><br>
  Facility<br><input id="facility" oninput="generateCode()"><br>

  Registration Date<br>
  <input type="date" id="reg_date" onchange="generateCode()"><br>

  Patient Code<br>
  <input id="code" readonly><br>

  Chest X-ray<br>
  <select id="cxr">
    <option>Normal</option>
    <option>Active TB</option>
    <option>Suggestive of TB</option>
    <option>Healed TB</option>
    <option>Others</option>
  </select><br>

  NPOC Pattern<br>
  <select id="npoc">
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
  </select><br>

  Smear Microscopy<br>
  <select id="smear">
    <option>Negative</option>
    <option>Scanty</option>
    <option>+</option>
    <option>++</option>
    <option>+++</option>
  </select><br>

  <button onclick="saveScreening()">Save</button>
  `;
}

function generateCode(){
  if(!region.value || !facility.value || !reg_date.value) return;
  let year = new Date(reg_date.value).getFullYear();
  let counter = localStorage.getItem("counter")||1;
  code.value = `${region.value}_${facility.value.toUpperCase().replace(/\s+/g,"")}_M_${counter}_${year}`;
  localStorage.setItem("counter",++counter);
}

function saveScreening(){
  let patient = {
    code: code.value,
    name: name.value,
    age: age.value
  };
  let i = patients.findIndex(p=>p.code===patient.code);
  if(i>=0) patients[i]={...patients[i],...patient};
  else patients.push(patient);
  localStorage.setItem("patients",JSON.stringify(patients));
  currentPatient = patient;
  alert("Saved");
}

// ===== DIAGNOSIS =====
function renderDiagnosis(){
if(!currentPatient) return showEmpty();

content.innerHTML = `
<h3>🧪 Diagnosis (${currentPatient.code})</h3>

RIF Pattern<br>
<select>
<option>MTB Not Detected</option>
<option>MTB Detected - Rifampicin Susceptible</option>
<option>MTB Detected - Rifampicin Resistant</option>
<option>MTB Detected - Rifampicin Resistant Indeterminate</option>
<option>MTB Trace Detected</option>
<option>Invalid/Error</option>
</select><br>

XDR Test Result<br>
<select>
<option>MTB Detected</option>
<option>MTB Not Detected</option>
<option>Invalid/Error</option>
</select><br>

INH<br>
<select>
<option>Susceptible</option>
<option>High Dose Resistant</option>
<option>Low Dose Resistant</option>
<option>Resistance Pattern Indeterminate</option>
</select><br>

FQ<br>
<select>
<option>Susceptible</option>
<option>High Dose Resistant</option>
<option>Low Dose Resistant</option>
<option>Resistance Pattern Indeterminate</option>
</select><br>

Injection<br>
<select>
<option>Susceptible</option>
<option>Resistant</option>
<option>Resistance Pattern Indeterminate</option>
</select><br>

Eto<br>
<select>
<option>Susceptible</option>
<option>Resistant</option>
<option>Resistance Pattern Indeterminate</option>
</select><br>

Type of Patient<br>
<select>
<option>No TB</option>
<option>New TB Patient</option>
<option>Relapse TB Patient</option>
<option>Failure</option>
<option>Loss to Follow Up</option>
<option>Others</option>
<option>Unknown</option>
</select><br>

<button>Save</button>
`;
}

// ===== TREATMENT =====
function renderTreatment(){
if(!currentPatient) return showEmpty();

content.innerHTML = `
<h3>💊 Treatment (${currentPatient.code})</h3>

HIV Status<br>
<select>
<option>Positive</option>
<option>Negative</option>
<option>Unknown</option>
</select><br>

DM Status<br>
<select>
<option>Yes</option>
<option>No</option>
<option>Unknown</option>
</select><br>

Other Comorbidities<br>
<input><br>

Start Date<br>
<input type="date"><br>

Regimen<br>
<select>
<option>2HPMZ-2HPM</option>
<option>2HRZE-2HR</option>
<option>2HRZ-4HR</option>
<option>2HRZE-4HR</option>
<option>3HRZE-5HRE</option>
<option>9REL</option>
<option>9HEL</option>
<option>9RECs</option>
<option>Other</option>
</select><br>

<button>Start</button>
`;
}

// ===== FOLLOWUP =====
function renderFollowup(){
if(!currentPatient) return showEmpty();

content.innerHTML = `
<h3>📊 Follow-up (${currentPatient.code})</h3>

Month<br><input><br>
Weight (kg)<br><input><br>

Smear Microscopy<br>
<select>
<option>Negative</option>
<option>Scanty</option>
<option>+</option>
<option>++</option>
<option>+++</option>
</select><br>

Adverse Events<br>
<textarea></textarea><br>

Regimen Change<br>
<select onchange="toggleRegimen(this.value)">
<option>No</option>
<option>Yes</option>
</select>

<div id="regimenBox" style="display:none;">
<select>
<option>2HPMZ-2HPM</option>
<option>2HRZE-2HR</option>
<option>2HRZ-4HR</option>
<option>2HRZE-4HR</option>
<option>3HRZE-5HRE</option>
<option>9REL</option>
<option>9HEL</option>
<option>9RECs</option>
<option>Other</option>
</select>
</div>

<br><button>Save</button>
`;
}

function toggleRegimen(v){
document.getElementById("regimenBox").style.display = v==="Yes"?"block":"none";
}

// ===== OUTCOME =====
function renderOutcome(){
if(!currentPatient) return showEmpty();

content.innerHTML = `
<h3>🏁 Outcome (${currentPatient.code})</h3>

<select>
<option>Cured</option>
<option>Completed</option>
<option>Failed</option>
<option>Loss to Follow Up</option>
<option>Died</option>
<option>Not Evaluated</option>
<option>Reclassified as DRTB</option>
</select><br>

Date<br><input type="date"><br>

<button>Save</button>
`;
}

// ===== DASHBOARD =====
function renderDashboard(){
content.innerHTML = `
<h3>📊 Dashboard</h3>
Total Patients: ${patients.length}
`;
}

function showEmpty(){
content.innerHTML = "⚠️ Select patient first";
}

showTab("patients");

</script>
</body>
</html>
