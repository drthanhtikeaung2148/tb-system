<!DOCTYPE html>
<html>
<head>
  <title>TB-Link System</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif;">

<h2>TB-Link System</h2>

<div style="display:flex;">

<!-- LEFT MENU -->
<div style="width:220px; border-right:1px solid #ccc; padding:10px;">
  <button onclick="showTab('patients')">👥 Patients</button><br><br>
  <button onclick="showTab('screening')">1. Screening</button><br><br>
  <button onclick="showTab('diagnosis')">2. Diagnosis</button><br><br>
  <button onclick="showTab('treatment')">3. Treatment</button><br><br>
  <button onclick="showTab('followup')">4. Follow-up</button><br><br>
  <button onclick="showTab('outcome')">5. Outcome</button><br><br>
</div>

<!-- RIGHT -->
<div style="flex:1; padding:20px;">
  <div id="content"></div>
</div>

</div>

<script>

// ================= CONFIG =================
const SUPABASE_URL = "https://ggsyhzumthecewuvmgxu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a3V5cmVieHBjanFqbHNtZmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg2MzksImV4cCI6MjA5MTIwNDYzOX0.YDSvhyHrufJMhfz37ZGSY6-11Ebkxsg-ErIh43Aw-DA";

function headers(){
  return {
    "Content-Type":"application/json",
    "apikey":SUPABASE_KEY,
    "Authorization":"Bearer "+SUPABASE_KEY,
    "Prefer":"return=representation"
  }
}

let currentEpisodeId = null;
let currentPatientCode = null;

// ================= NAV =================
function showTab(tab){
  if(tab==="patients") renderPatients();
  if(tab==="screening") renderScreening();
  if(tab==="diagnosis") renderDiagnosis();
  if(tab==="treatment") renderTreatment();
  if(tab==="followup") renderFollowup();
  if(tab==="outcome") renderOutcome();
}

// ================= CODE GENERATOR =================
function generatePatientCode(){

  const region = document.getElementById("region").value;
  const facility = document.getElementById("facility").value;
  const date = document.getElementById("regdate").value;

  if(!region || !facility || !date) return;

  const year = new Date(date).getFullYear();

  let counter = localStorage.getItem("tb_counter_"+year) || 0;
  counter++;
  localStorage.setItem("tb_counter_"+year, counter);

  const code = `${region}_${facility}_M_${counter}_${year}`;

  document.getElementById("code").value = code;
}

// ================= SCREENING =================
function renderScreening(){
  document.getElementById("content").innerHTML = `
    <h3>🩺 Screening</h3>

    Name <br><input id="name"><br><br>
    Age <br><input id="age"><br><br>

    Sex <br>
    <select id="sex">
      <option>Male</option><option>Female</option>
    </select><br><br>

    Region <br>
    <select id="region" onchange="generatePatientCode()">
      <option value="">--select--</option>
      <option value="YGN">Yangon</option>
      <option value="MDY">Mandalay</option>
    </select><br><br>

    Township <br><input id="township"><br><br>

    Facility <br>
    <select id="facility" onchange="generatePatientCode()">
      <option value="">--select--</option>
      <option value="PANHLAING">Pan Hlaing</option>
      <option value="BAHOSI">Bahosi</option>
      <option value="SAKURA">Sakura</option>
    </select><br><br>

    Registration Date <br>
    <input type="date" id="regdate" onchange="generatePatientCode()"><br><br>

    Patient Code <br>
    <input id="code" readonly><br><br>

    <button onclick="savePatient()">Save</button>
  `;
}

async function savePatient(){

  const body = {
    name: name.value,
    age: age.value,
    sex: sex.value,
    code: code.value
  };

  const res = await fetch(`${SUPABASE_URL}/rest/v1/patients`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify([body])
  });

  const data = await res.json();

  const ep = await fetch(`${SUPABASE_URL}/rest/v1/episodes`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{patient_id:data[0].id}])
  });

  const epData = await ep.json();

  currentEpisodeId = epData[0].id;
  currentPatientCode = code.value;

  alert("Saved");
}

// ================= PATIENT LIST =================
async function renderPatients(){

  document.getElementById("content").innerHTML = `
    <h3>👥 Patients</h3>
    <div id="list"></div>
  `;

  const res = await fetch(`${SUPABASE_URL}/rest/v1/patients?select=*`,{
    headers:headers()
  });

  const data = await res.json();

  let html = "";

  data.forEach(p=>{
    html+=`
      <div onclick="selectPatient('${p.id}','${p.code}')"
      style="border:1px solid #ccc;padding:10px;margin:5px;cursor:pointer">
      ${p.code} - ${p.name}
      </div>
    `;
  });

  list.innerHTML = html;
}

async function selectPatient(id,code){

  const res = await fetch(`${SUPABASE_URL}/rest/v1/episodes?patient_id=eq.${id}`,{
    headers:headers()
  });

  const data = await res.json();

  currentEpisodeId = data[0].id;
  currentPatientCode = code;

  alert("Selected "+code);
}

// ================= DIAGNOSIS =================
function renderDiagnosis(){
  document.getElementById("content").innerHTML = `
    <h3>🧪 Diagnosis (${currentPatientCode||""})</h3>

    RIF Pattern<br>
    <select id="rif">
      <option>MTB Negative</option>
      <option>RIF Resistant</option>
    </select><br><br>

    NPOC Pattern<br>
    <select id="npoc">
      <option>MTB Detected</option>
      <option>MTB Not Detected</option>
    </select><br><br>

    XDR Pattern<br>
    INH <input id="inh"><br>
    FQ <input id="fq"><br>
    Inj <input id="inj"><br>
    Eto <input id="eto"><br><br>

    <button onclick="saveDiagnosis()">Save</button>
  `;
}

async function saveDiagnosis(){

  await fetch(`${SUPABASE_URL}/rest/v1/episodes?id=eq.${currentEpisodeId}`,{
    method:"PATCH",
    headers:headers(),
    body:JSON.stringify({
      rif: rif.value,
      npoc: npoc.value,
      inh: inh.value,
      fq: fq.value,
      inj: inj.value,
      eto: eto.value
    })
  });

  alert("Saved");
}

// ================= TREATMENT =================
function renderTreatment(){
  document.getElementById("content").innerHTML = `
    <h3>💊 Treatment (${currentPatientCode||""})</h3>

    Start Date<br>
    <input type="date" id="start"><br><br>

    Regimen<br>
    <select id="reg">
      <option>2HRZE/4HR</option>
      <option>MDR Short</option>
    </select><br><br>

    <button onclick="saveTreatment()">Start</button>
  `;
}

async function saveTreatment(){
  await fetch(`${SUPABASE_URL}/rest/v1/episodes?id=eq.${currentEpisodeId}`,{
    method:"PATCH",
    headers:headers(),
    body:JSON.stringify({
      start_date:start.value,
      regimen:reg.value,
      status:"On Treatment"
    })
  });
  alert("Started");
}

// ================= FOLLOWUP =================
function renderFollowup(){
  document.getElementById("content").innerHTML = `
    <h3>📊 Follow-up (${currentPatientCode||""})</h3>

    Month <input id="month"><br><br>
    Weight <input id="weight"><br><br>

    Smear
    <select id="smear">
      <option>+</option><option>++</option>
    </select><br><br>

    AE<br>
    <textarea id="ae"></textarea><br><br>

    <button onclick="saveFollowup()">Save</button>
  `;
}

async function saveFollowup(){
  await fetch(`${SUPABASE_URL}/rest/v1/followups`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{
      episode_id:currentEpisodeId,
      month:month.value,
      weight:weight.value,
      smear:smear.value,
      ae:ae.value
    }])
  });
  alert("Saved");
}

// ================= OUTCOME =================
function renderOutcome(){
  document.getElementById("content").innerHTML = `
    <h3>🏁 Outcome (${currentPatientCode||""})</h3>

    <select id="outcome" onchange="toggleDeath()">
      <option>Cured</option>
      <option>Completed</option>
      <option>Died</option>
    </select><br><br>

    Date <input id="date"><br><br>

    <div id="deathBox" style="display:none;">
      Cause <input id="cause"><br><br>
    </div>

    <button onclick="saveOutcome()">Save</button>
  `;
}

function toggleDeath(){
  deathBox.style.display = outcome.value==="Died"?"block":"none";
}

async function saveOutcome(){
  await fetch(`${SUPABASE_URL}/rest/v1/outcomes`,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify([{
      episode_id:currentEpisodeId,
      outcome:outcome.value,
      date:date.value,
      cause:cause?.value
    }])
  });
  alert("Saved");
}

// START
showTab("patients");

</script>
</body>
</html>
