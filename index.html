<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TB-Link System</title>

<style>
body { font-family: Arial; }
.container { display: flex; }
.sidebar { width: 220px; padding: 10px; }
.content { flex: 1; padding: 20px; border-left: 1px solid #ccc; }
button { margin: 5px 0; }
input, select, textarea { width: 260px; margin-bottom: 10px; }
.card { border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer; }
</style>

</head>

<body>

<h2>TB-Link System</h2>

<div class="container">

<div class="sidebar">
<button onclick="showTab('patients')">👥 Patients</button><br>
<button onclick="showTab('screening')">1. Screening</button><br>
<button onclick="showTab('diagnosis')">2. Diagnosis</button><br>
<button onclick="showTab('treatment')">3. Treatment</button><br>
<button onclick="showTab('followup')">4. Follow-up</button><br>
<button onclick="showTab('outcome')">5. Outcome</button><br>
</div>

<div class="content" id="content"></div>

</div>

<script>

// ================= GLOBAL STATE =================
let patients = JSON.parse(localStorage.getItem("patients") || "[]");
let currentPatient = null;

// ================= NAVIGATION =================
function showTab(tab){
  if(tab==="patients") renderPatients();
  if(tab==="screening") renderScreening();
  if(tab==="diagnosis") renderDiagnosis();
  if(tab==="treatment") renderTreatment();
  if(tab==="followup") renderFollowup();
  if(tab==="outcome") renderOutcome();
}

// ================= PATIENT LIST =================
function renderPatients(){

  let list = patients.map(p => `
    <div class="card" onclick="selectPatient('${p.code}')">
      <b>${p.name}</b> (${p.age})<br>
      ${p.code}
    </div>
  `).join("");

  document.getElementById("content").innerHTML = `
    <h3>👥 Patients</h3>
    <button onclick="newPatient()">+ New Patient</button>
    <hr>
    ${list || "No patients"}
  `;
}

function newPatient(){
  currentPatient = null;
  renderScreening();
}

function selectPatient(code){
  currentPatient = patients.find(p=>p.code===code);
  renderScreening();
}

// ================= SCREENING =================
function renderScreening(){

  const p = currentPatient || {};

  document.getElementById("content").innerHTML = `
  <h3>🩺 Screening ${p.code ? '('+p.code+')':''}</h3>

  Name<br><input id="name" value="${p.name||''}"><br>
  Age<br><input id="age" value="${p.age||''}"><br>

  Sex<br>
  <select id="sex">
    <option ${p.sex==="Male"?"selected":""}>Male</option>
    <option ${p.sex==="Female"?"selected":""}>Female</option>
  </select><br>

  Region<br>
  <select id="region" onchange="generateCode()">
    <option value="">--select--</option>
    <option value="YGN">Yangon</option>
    <option value="MDY">Mandalay</option>
    <option value="SGG">Sagaing</option>
  </select><br>

  Township<br><input id="township" value="${p.township||''}"><br>
  Facility<br><input id="facility" value="${p.facility||''}" oninput="generateCode()"><br>

  Registration Date<br>
  <input type="date" id="reg_date" value="${p.reg_date||''}" onchange="generateCode()"><br>

  Patient Code<br>
  <input id="code" value="${p.code||''}" readonly><br>

  Chest X-ray<br>
  <select id="cxr">
    <option>Normal</option>
    <option>Active TB</option>
    <option>Suggestive of TB</option>
    <option>Healed TB</option>
    <option>Others</option>
  </select><br>

  NPOC<br>
  <select id="npoc">
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
  </select><br>

  Smear<br>
  <select id="smear">
    <option>Negative</option>
    <option>Scanty</option>
    <option>+</option>
    <option>++</option>
    <option>+++</option>
  </select><br>

  <button onclick="saveScreening()">Save</button>
  `;
}

function generateCode(){
  const r = region.value;
  const f = facility.value;
  const d = reg_date.value;
  if(!r||!f||!d) return;

  const year = new Date(d).getFullYear();
  let counter = localStorage.getItem("counter")||1;

  code.value = r+"_"+f.toUpperCase().replace(/\s+/g,"")+"_M_"+counter+"_"+year;

  localStorage.setItem("counter",parseInt(counter)+1);
}

function saveScreening(){

  const patient = {
    code: code.value,
    name: name.value,
    age: age.value,
    sex: sex.value,
    township: township.value,
    facility: facility.value,
    reg_date: reg_date.value,
    screening:{
      cxr: cxr.value,
      npoc: npoc.value,
      smear: smear.value
    }
  };

  const i = patients.findIndex(p=>p.code===patient.code);
  if(i>=0) patients[i]= {...patients[i],...patient};
  else patients.push(patient);

  localStorage.setItem("patients",JSON.stringify(patients));
  currentPatient = patient;

  alert("Saved");
}

// ================= DIAGNOSIS =================
function renderDiagnosis(){

  if(!currentPatient) return showEmpty();

  document.getElementById("content").innerHTML = `
  <h3>🧪 Diagnosis (${currentPatient.code})</h3>

  RIF<br>
  <select id="rif">
    <option>MTB Not Detected</option>
    <option>MTB Detected - Rifampicin Resistant</option>
  </select><br>

  XDR Result<br>
  <select id="xdr">
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
  </select><br>

  INH<br><select id="inh"><option>Susceptible</option><option>Resistant</option></select><br>
  FQ<br><select id="fq"><option>Susceptible</option><option>Resistant</option></select><br>

  <button onclick="saveDiagnosis()">Save</button>
  `;
}

function saveDiagnosis(){
  currentPatient.diagnosis = {
    rif: rif.value,
    xdr: xdr.value,
    inh: inh.value,
    fq: fq.value
  };
  saveAll();
}

// ================= TREATMENT =================
function renderTreatment(){

  if(!currentPatient) return showEmpty();

  document.getElementById("content").innerHTML = `
  <h3>💊 Treatment (${currentPatient.code})</h3>

  HIV<br><select id="hiv"><option>Positive</option><option>Negative</option><option>Unknown</option></select><br>
  DM<br><select id="dm"><option>Yes</option><option>No</option><option>Unknown</option></select><br>

  Start Date<br><input type="date" id="start"><br>

  Regimen<br>
  <select id="reg">
    <option>2HRZE-4HR</option>
    <option>9REL</option>
  </select><br>

  <button onclick="saveTreatment()">Save</button>
  `;
}

function saveTreatment(){
  currentPatient.treatment = {
    hiv:hiv.value,
    dm:dm.value,
    start:start.value,
    reg:reg.value
  };
  saveAll();
}

// ================= FOLLOW-UP =================
function renderFollowup(){

  if(!currentPatient) return showEmpty();

  document.getElementById("content").innerHTML = `
  <h3>📊 Follow-up (${currentPatient.code})</h3>

  Month<br><input id="month"><br>
  Weight<br><input id="weight"><br>

  Smear<br>
  <select id="smear">
    <option>Negative</option>
    <option>+</option>
  </select><br>

  AE<br><textarea id="ae"></textarea><br>

  <button onclick="saveFollowup()">Save</button>
  `;
}

function saveFollowup(){
  currentPatient.followup = {
    month:month.value,
    weight:weight.value,
    smear:smear.value,
    ae:ae.value
  };
  saveAll();
}

// ================= OUTCOME =================
function renderOutcome(){

  if(!currentPatient) return showEmpty();

  document.getElementById("content").innerHTML = `
  <h3>🏁 Outcome (${currentPatient.code})</h3>

  Outcome<br>
  <select id="outcome" onchange="toggleDeath()">
    <option>Cured</option>
    <option>Completed</option>
    <option>Died</option>
  </select><br>

  Date<br><input type="date" id="date"><br>

  <div id="death" style="display:none;">
    Cause<br><input id="cause"><br>
  </div>

  <button onclick="saveOutcome()">Save</button>
  `;
}

function toggleDeath(){
  death.style.display = outcome.value==="Died"?"block":"none";
}

function saveOutcome(){
  currentPatient.outcome = {
    outcome:outcome.value,
    date:date.value,
    cause: (outcome.value==="Died"?cause.value:"")
  };
  saveAll();
}

// ================= SAVE =================
function saveAll(){
  const i = patients.findIndex(p=>p.code===currentPatient.code);
  patients[i]=currentPatient;
  localStorage.setItem("patients",JSON.stringify(patients));
  alert("Saved");
}

// ================= HELPER =================
function showEmpty(){
  document.getElementById("content").innerHTML = "Select patient first";
}

// INIT
showTab("patients");

</script>

</body>
</html>
