<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TB-Link System</title>

<style>
body { font-family: Arial; }
.container { display: flex; }
.sidebar { width: 220px; padding: 10px; }
.content { flex: 1; padding: 20px; border-left: 1px solid #ccc; }
button { margin: 5px 0; }
input, select, textarea { width: 260px; margin-bottom: 10px; }
.card { border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer; }
</style>

</head>

<body>

<h2>TB-Link System</h2>

<div class="container">

<div class="sidebar">
<button onclick="showTab('patients')">👥 Patients</button><br>
<button onclick="showTab('screening')">1. Screening</button><br>
<button onclick="showTab('diagnosis')">2. Diagnosis</button><br>
<button onclick="showTab('treatment')">3. Treatment</button><br>
<button onclick="showTab('followup')">4. Follow-up</button><br>
<button onclick="showTab('outcome')">5. Outcome</button><br>
<button onclick="showTab('dashboard')">📊 Dashboard</button><br>
</div>

<div class="content" id="content"></div>

</div>

<script>

// ================= GLOBAL =================
let patients = JSON.parse(localStorage.getItem("patients") || "[]");
let currentPatient = null;

// ================= NAV =================
function showTab(tab){
  if(tab==="patients") renderPatients();
  if(tab==="screening") renderScreening();
  if(tab==="diagnosis") renderDiagnosis();
  if(tab==="treatment") renderTreatment();
  if(tab==="followup") renderFollowup();
  if(tab==="outcome") renderOutcome();
  if(tab==="dashboard") renderDashboard();
}

// ================= PATIENTS =================
function renderPatients(){

  let list = patients.map(p => `
    <div class="card" onclick="selectPatient('${p.code}')">
      <b>${p.name}</b> (${p.age})<br>
      ${p.code}<br>
      ${p.outcome?.outcome || "No outcome"}
    </div>
  `).join("");

  document.getElementById("content").innerHTML = `
    <h3>👥 Patients</h3>

    🔍 Search<br>
    <input oninput="searchPatients(this.value)"><br>

    Filter<br>
    <select onchange="filterPatients(this.value)">
      <option value="all">All</option>
      <option value="On Treatment">On Treatment</option>
      <option value="Completed">Completed</option>
    </select>

    <br><br>
    <button onclick="newPatient()">+ New Patient</button>

    <hr>
    <div id="patientList">${list || "No patients"}</div>
  `;
}

function searchPatients(q){
  let filtered = patients.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
  displayList(filtered);
}

function filterPatients(status){
  if(status==="all") return displayList(patients);

  let filtered = patients.filter(p => p.outcome?.outcome === status);
  displayList(filtered);
}

function displayList(arr){
  document.getElementById("patientList").innerHTML =
    arr.map(p => `
      <div class="card" onclick="selectPatient('${p.code}')">
        ${p.name} (${p.code})
      </div>
    `).join("");
}

function newPatient(){
  currentPatient = null;
  renderScreening();
}

function selectPatient(code){
  currentPatient = patients.find(p=>p.code===code);
  renderScreening();
}

// ================= SCREENING =================
function renderScreening(){

  const p = currentPatient || {};

  document.getElementById("content").innerHTML = `
  <h3>🩺 Screening ${p.code ? '('+p.code+')':''}</h3>

  Name<br><input id="name" value="${p.name||''}"><br>
  Age<br><input id="age" value="${p.age||''}"><br>

  Sex<br>
  <select id="sex">
    <option ${p.sex==="Male"?"selected":""}>Male</option>
    <option ${p.sex==="Female"?"selected":""}>Female</option>
  </select><br>

  Region<br>
  <select id="region" onchange="generateCode()">
    <option value="">--select--</option>
    <option value="YGN">Yangon</option>
    <option value="MDY">Mandalay</option>
    <option value="SGG">Sagaing</option>
  </select><br>

  Township<br><input id="township" value="${p.township||''}"><br>
  Facility<br><input id="facility" value="${p.facility||''}" oninput="generateCode()"><br>

  Registration Date<br>
  <input type="date" id="reg_date" value="${p.reg_date||''}" onchange="generateCode()"><br>

  Patient Code<br>
  <input id="code" value="${p.code||''}" readonly><br>

  Chest X-ray<br>
  <select id="cxr">
    <option>Normal</option>
    <option>Active TB</option>
    <option>Suggestive of TB</option>
    <option>Healed TB</option>
    <option>Others</option>
  </select><br>

  NPOC Pattern<br>
  <select id="npoc">
    <option>MTB Detected</option>
    <option>MTB Not Detected</option>
  </select><br>

  Smear<br>
  <select id="smear">
    <option>Negative</option>
    <option>Scanty</option>
    <option>+</option>
    <option>++</option>
    <option>+++</option>
  </select><br>

  <button onclick="saveScreening()">Save</button>
  `;
}

function generateCode(){
  if(!region.value || !facility.value || !reg_date.value) return;

  let year = new Date(reg_date.value).getFullYear();
  let counter = localStorage.getItem("counter")||1;

  code.value = `${region.value}_${facility.value.toUpperCase().replace(/\s+/g,"")}_M_${counter}_${year}`;
  localStorage.setItem("counter",parseInt(counter)+1);
}

function saveScreening(){

  let patient = {
    code: code.value,
    name: name.value,
    age: age.value,
    sex: sex.value,
    township: township.value,
    facility: facility.value,
    reg_date: reg_date.value,
    screening:{
      cxr: cxr.value,
      npoc: npoc.value,
      smear: smear.value
    }
  };

  let i = patients.findIndex(p=>p.code===patient.code);
  if(i>=0) patients[i]={...patients[i],...patient};
  else patients.push(patient);

  localStorage.setItem("patients",JSON.stringify(patients));
  currentPatient = patient;

  alert("Saved");
}

// ================= DASHBOARD =================
function renderDashboard(){

  let total = patients.length;
  let diagnosed = patients.filter(p=>p.diagnosis).length;
  let onTx = patients.filter(p=>p.treatment).length;
  let completed = patients.filter(p=>p.outcome?.outcome==="Completed").length;

  document.getElementById("content").innerHTML = `
    <h3>📊 TB Dashboard</h3>

    Total Patients: <b>${total}</b><br><br>
    Diagnosed: <b>${diagnosed}</b><br><br>
    On Treatment: <b>${onTx}</b><br><br>
    Completed: <b>${completed}</b><br><br>

    <hr>

    <h4>TB Cascade</h4>
    Screening → Diagnosis → Treatment → Outcome
  `;
}

// ================= OTHER TABS (SHORT) =================
function renderDiagnosis(){ if(!currentPatient) return showEmpty(); document.getElementById("content").innerHTML=`<h3>Diagnosis (${currentPatient.code})</h3>`;}
function renderTreatment(){ if(!currentPatient) return showEmpty(); document.getElementById("content").innerHTML=`<h3>Treatment (${currentPatient.code})</h3>`;}
function renderFollowup(){ if(!currentPatient) return showEmpty(); document.getElementById("content").innerHTML=`<h3>Follow-up (${currentPatient.code})</h3>`;}
function renderOutcome(){ if(!currentPatient) return showEmpty(); document.getElementById("content").innerHTML=`<h3>Outcome (${currentPatient.code})</h3>`;}

function showEmpty(){
  document.getElementById("content").innerHTML = "⚠️ Select patient first";
}

// INIT
showTab("patients");

</script>

</body>
</html>
