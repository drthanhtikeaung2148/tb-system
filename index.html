<!DOCTYPE html>
<html>
<head>
  <title>TB-Link</title>
</head>

<body style="font-family:sans-serif;">

<h2>TB-Link System</h2>

<div style="display:flex;">

  <!-- LEFT MENU -->
  <div style="width:220px; border-right:1px solid #ccc; padding:10px;">
    <button onclick="showTab('patients')">👥 Patients</button><br><br>
    <button onclick="showTab('screening')">1. Screening</button><br><br>
    <button onclick="showTab('diagnosis')">2. Diagnosis</button><br><br>
    <button onclick="showTab('treatment')">3. Treatment</button><br><br>
    <button onclick="showTab('followup')">4. Follow-up</button><br><br>
    <button onclick="showTab('outcome')">5. Outcome</button>
  </div>

  <!-- RIGHT PANEL -->
  <div style="flex:1; padding:20px;">
    <div id="content"></div>
  </div>

</div>

<script>

// 🔥 CONFIG (PUT YOUR REAL VALUES)
const SUPABASE_URL = "https://uvkuyrebxpcjqjlsmfgr.supabase.co";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a3V5cmVieHBjanFqbHNtZmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg2MzksImV4cCI6MjA5MTIwNDYzOX0.YDSvhyHrufJMhfz37ZGSY6-11Ebkxsg-ErIh43Aw-DA";

// ================= NAV =================
function showTab(tab) {
  if (tab === "patients") renderPatients();
  if (tab === "screening") renderScreening();
  if (tab === "diagnosis") renderDiagnosis();
  if (tab === "treatment") renderTreatment();
  if (tab === "followup") renderFollowup();
  if (tab === "outcome") renderOutcome();
}

// ================= PATIENT LIST =================
function renderPatients() {
  document.getElementById("content").innerHTML = `
    <h3>👥 Patients</h3>
    <button onclick="loadPatients()">Refresh</button><br><br>
    <div id="patientList"></div>
  `;
  loadPatients();
}

async function loadPatients() {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/patients?select=*`, {
    headers: {
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    }
  });

  const data = await res.json();

  let html = "";

  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer;"
           onclick="selectPatient('${p.id}')">
        <b>${p.name}</b> (${p.age})
      </div>
    `;
  });

  document.getElementById("patientList").innerHTML = html || "No patients";
}

async function selectPatient(patientId) {

  const res = await fetch(`${SUPABASE_URL}/rest/v1/episodes?patient_id=eq.${patientId}`, {
    headers: {
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    }
  });

  const data = await res.json();

  if (!data.length) {
    alert("No episode → create from screening");
    return;
  }

  currentEpisodeId = data[0].id;

  alert("✅ Patient selected");
  showTab("diagnosis");
}

// ================= SCREENING =================
let currentEpisodeId = null;

function renderScreening() {
  document.getElementById("content").innerHTML = `
    <h3>🩺 Screening</h3>

    <input id="name" placeholder="Name"><br><br>
    <input id="age" placeholder="Age"><br><br>

    <select id="sex">
      <option>Male</option>
      <option>Female</option>
    </select><br><br>

    <button onclick="savePatient()">Save & Create Episode</button>
  `;
}

async function savePatient() {

  const name = document.getElementById("name").value;
  const age = parseInt(document.getElementById("age").value);
  const sex = document.getElementById("sex").value;

  // 1. Create patient
  const pRes = await fetch(`${SUPABASE_URL}/rest/v1/patients`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY,
      "Prefer": "return=representation"
    },
    body: JSON.stringify([{ name, age, sex }])
  });

  const patient = await pRes.json();

  if (!patient[0]) {
    alert("❌ Patient creation failed");
    return;
  }

  // 2. Create episode
  const eRes = await fetch(`${SUPABASE_URL}/rest/v1/episodes`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY,
      "Prefer": "return=representation"
    },
    body: JSON.stringify([{ patient_id: patient[0].id }])
  });

  const episode = await eRes.json();

  currentEpisodeId = episode[0].id;

  alert("✅ Patient & Episode created");
}

// ================= DIAGNOSIS =================
function renderDiagnosis() {
  document.getElementById("content").innerHTML = `
    <h3>🧪 Diagnosis</h3>

    <select id="xpert">
      <option>MTB detected</option>
      <option>MTB detected Rif resistant</option>
    </select><br><br>

    <button onclick="saveDiagnosis()">Save Diagnosis</button>
  `;
}

async function saveDiagnosis() {

  const xpert = document.getElementById("xpert").value;
  const resistance = xpert.includes("Rif") ? "RR-TB" : "DS-TB";

  await fetch(`${SUPABASE_URL}/rest/v1/lab_results`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify([{
      episode_id: currentEpisodeId,
      xpert_result: xpert,
      resistance_classification: resistance
    }])
  });

  alert("✅ Diagnosis saved");
}

// ================= TREATMENT =================
function renderTreatment() {
  document.getElementById("content").innerHTML = `
    <h3>💊 Treatment</h3>
    <button onclick="startTreatment()">Start Treatment</button>
  `;
}

async function startTreatment() {

  await fetch(`${SUPABASE_URL}/rest/v1/treatments`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify([{
      episode_id: currentEpisodeId,
      regimen: "Standard",
      start_date: new Date()
    }])
  });

  alert("✅ Treatment started");
}

// ================= FOLLOW-UP =================
function renderFollowup() {
  document.getElementById("content").innerHTML = `
    <h3>📊 Follow-up</h3>
    <input id="weight" placeholder="Weight"><br><br>
    <button onclick="addFollowup()">Save</button>
  `;
}

async function addFollowup() {

  const weight = document.getElementById("weight").value;

  await fetch(`${SUPABASE_URL}/rest/v1/followups`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify([{
      episode_id: currentEpisodeId,
      weight,
      visit_date: new Date()
    }])
  });

  alert("✅ Follow-up saved");
}

// ================= OUTCOME =================
function renderOutcome() {
  document.getElementById("content").innerHTML = `
    <h3>🏁 Outcome</h3>

    <select id="outcome">
      <option>Cured</option>
      <option>Completed</option>
      <option>Failed</option>
      <option>Died</option>
    </select><br><br>

    <button onclick="saveOutcome()">Save</button>
  `;
}

async function saveOutcome() {

  const outcome = document.getElementById("outcome").value;

  await fetch(`${SUPABASE_URL}/rest/v1/outcomes`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": API_KEY,
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify([{
      episode_id: currentEpisodeId,
      outcome,
      outcome_date: new Date()
    }])
  });

  alert("✅ Outcome saved");
}

// START
showTab("screening");

</script>

</body>
</html>
