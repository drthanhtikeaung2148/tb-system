<!DOCTYPE html>
<html>
<head>
  <title>TB-Link</title>

  <!-- ✅ 1. ADD THIS (Supabase library) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <!-- Your form -->
  <input id="name" placeholder="Name">
  <input id="age" placeholder="Age">

  <select id="diagnosis">
    <option>Confirmed TB</option>
    <option>Clinically Diagnosed TB</option>
    <option>Not TB</option>
  </select>

  <!-- ✅ 2. BUTTON -->
  <button onclick="saveData()">Submit</button>


  <!-- ✅ 3. ADD ALL SCRIPTS HERE -->
  <script>
    // 🔑 Supabase connection (TOP)
    const supabaseUrl = "https://uvkuyrebxpcjqjlsmfgr.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2a3V5cmVieHBjanFqbHNtZmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Mjg2MzksImV4cCI6MjA5MTIwNDYzOX0.YDSvhyHrufJMhfz37ZGSY6-11Ebkxsg-ErIh43Aw-DA";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);


    // 💾 SAVE FUNCTION (PASTE HERE)
    async function saveData() {
      const patient_id = "TB-" + Date.now();
      const episode_id = "EP-" + Date.now();

      const name = document.getElementById("name").value;
      const age = document.getElementById("age").value;
      const diagnosis = document.getElementById("diagnosis").value;

      const { error } = await supabaseClient
        .from("tb_data")
        .insert([
          {
            patient_id: patient_id,
            episode_id: episode_id,
            name: name,
            age: age,
            diagnosis: diagnosis,
            created_at: new Date()
          }
        ]);

      if (error) {
        alert("❌ Error: " + error.message);
      } else {
        alert("✅ Saved successfully!");
      }
    }
  </script>

</body>
</html>
